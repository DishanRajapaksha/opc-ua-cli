name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/align-cli-contracts
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Apply CLI contract migration
        run: python3 scripts/apply-cli-contracts.py

      - name: Tidy dependencies
        run: go mod tidy

      - name: Format
        run: gofmt -w internal/output/output.go internal/cli/exit_codes.go internal/cli/formats.go internal/cli/render.go internal/cli/commands.go internal/cli/app.go internal/cli/contracts_test.go

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: go test ./...

      - name: Build
        run: |
          mkdir -p bin
          go build -o bin/opc-ua-cli .

      - name: Commit verified changes
        run: |
          rm scripts/apply-cli-contracts.py
          rm .github/workflows/apply-cli-contracts.yml
          cat > .github/workflows/ci.yml <<'EOF'
          name: ci

          on:
            push:
              branches:
                - main
            pull_request:

          jobs:
            test:
              runs-on: ubuntu-latest
              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Setup Go
                  uses: actions/setup-go@v5
                  with:
                    go-version-file: go.mod
                    cache: false

                - name: Tidy dependencies
                  run: go mod tidy

                - name: Check formatting
                  run: test -z "$(gofmt -l .)"

                - name: Test
                  run: go test ./...

                - name: Build
                  run: |
                    mkdir -p bin
                    go build -o bin/opc-ua-cli .
          EOF
          rm -rf bin
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align CLI contracts"
          git push origin HEAD:agent/align-cli-contracts
