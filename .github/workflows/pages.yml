name: pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static page from README
        run: |
          sudo apt-get update
          sudo apt-get install -y cmark-gfm
          mkdir -p site
          {
            echo "<!doctype html>"
            echo "<html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">"
            echo "<title>opc-ua-cli</title>"
            echo "<style>body{max-width:920px;margin:40px auto;padding:0 16px;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;line-height:1.6;color:#24292f}h1,h2,h3{line-height:1.25}pre{background:#f6f8fa;padding:12px;overflow:auto;border-radius:6px}code{background:#f6f8fa;padding:2px 4px;border-radius:4px}pre code{background:transparent;padding:0}table{border-collapse:collapse;width:100%}th,td{border:1px solid #d0d7de;padding:6px 10px;text-align:left}blockquote{border-left:4px solid #d0d7de;padding-left:12px;color:#57606a}</style>"
            echo "</head><body>"
            cmark-gfm --unsafe --extension table --extension autolink --extension strikethrough README.md
            echo "</body></html>"
          } > site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
