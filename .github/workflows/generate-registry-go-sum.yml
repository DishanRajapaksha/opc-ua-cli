name: Generate registry module files

on:
  push:
    branches:
      - agent/adopt-registry-parser
  pull_request:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: |
          go get github.com/DishanRajapaksha/industrial-cli-kit@affb87edac45
          go mod tidy
      - uses: actions/upload-artifact@v4
        with:
          name: registry-module-files
          path: |
            go.mod
            go.sum
