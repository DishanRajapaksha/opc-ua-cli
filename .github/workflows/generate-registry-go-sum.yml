name: Generate registry module files

on:
  push:
    branches:
      - agent/adopt-registry-parser

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adopt-registry-parser
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: |
          go get github.com/DishanRajapaksha/industrial-cli-kit@affb87edac45
          go mod tidy
      - name: Commit module files
        run: |
          if git diff --quiet -- go.mod go.sum; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add go.mod go.sum
          git commit -m "Update industrial CLI kit dependency"
          git push origin HEAD:agent/adopt-registry-parser
