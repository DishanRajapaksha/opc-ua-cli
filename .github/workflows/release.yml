name: release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: opc-ua-cli-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: opc-ua-cli-linux-arm64
          - goos: darwin
            goarch: arm64
            artifact: opc-ua-cli-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact: opc-ua-cli-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy dependencies
        run: go mod tidy

      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o "dist/${{ matrix.artifact }}" .

      - name: Install UPX
        if: matrix.goos != 'darwin'
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl

      - name: Compress binary with UPX
        if: matrix.goos != 'darwin'
        run: |
          upx --best --lzma "dist/${{ matrix.artifact }}"

      - name: Package binary
        shell: bash
        run: |
          cd dist
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            zip "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"
          else
            tar -czf "${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
          generate_release_notes: true
