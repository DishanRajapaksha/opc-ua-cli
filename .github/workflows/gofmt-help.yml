name: Format registry help

on:
  push:
    branches:
      - agent/adopt-registry-help
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adopt-registry-help
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: gofmt -w internal/cli/app.go internal/cli/registry_help.go
      - name: Commit formatting
        run: |
          if git diff --quiet -- internal/cli/app.go internal/cli/registry_help.go; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add internal/cli/app.go internal/cli/registry_help.go
          git commit -m "Format registry help"
          git push
